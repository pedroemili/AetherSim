<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Partículas con Gestos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1400px;
        }

        .canvas-container {
            background: white;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        canvas {
            border-radius: 10px;
            cursor: crosshair;
        }

        .controls {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            min-width: 300px;
            max-width: 400px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #5ee7df 0%, #b490ca 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(94, 231, 223, 0.4);
        }

        input[type="range"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
        }

        .status {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .status-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .status-label {
            color: #666;
            font-weight: 500;
        }

        .status-value {
            color: #333;
            font-weight: 600;
        }

        .gesture-indicator {
            width: 100%;
            height: 60px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .instructions {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .instructions h3 {
            color: #856404;
            margin-bottom: 10px;
        }

        .instructions ul {
            color: #856404;
            padding-left: 20px;
        }

        .instructions li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <h1>🎮 Simulador de Partículas con Gestos</h1>
    
    <div class="container">
        <div class="canvas-container">
            <canvas id="particleCanvas"></canvas>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <button class="btn-primary" onclick="startCamera()">📷 Iniciar Cámara</button>
                <button class="btn-danger" onclick="stopCamera()">⏹ Detener Cámara</button>
                <button class="btn-success" onclick="addParticles()">✨ Añadir Partículas</button>
            </div>
            
            <div class="control-group">
                <label for="particleCount">Cantidad de Partículas: <span id="particleCountValue">200</span></label>
                <input type="range" id="particleCount" min="50" max="500" value="200" onchange="updateParticleCount()">
            </div>
            
            <div class="status">
                <div class="status-item">
                    <span class="status-label">Estado:</span>
                    <span class="status-value" id="cameraStatus">Detenido</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Partículas:</span>
                    <span class="status-value" id="particleStatus">0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Gesto:</span>
                    <span class="status-value" id="gestureType">Ninguno</span>
                </div>
                <div class="gesture-indicator" id="gestureIndicator">
                    Sin gestos detectados
                </div>
            </div>
            
            <div class="instructions">
                <h3>Instrucciones:</h3>
                <ul>
                    <li><strong>Mano abierta:</strong> Repele las partículas</li>
                    <li><strong>Puño cerrado:</strong> Atrae las partículas</li>
                    <li><strong>Mano semi-abierta:</strong> Mueve las partículas</li>
                    <li><strong>Click en canvas:</strong> Añade partículas en esa posición</li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module">
        import init, { ParticleSystem } from './rust_particles/pkg/particles_wasm.js';

        let particleSystem = null;
        let canvas = null;
        let ctx = null;
        let animationId = null;
        let gestureData = { x: 0.5, y: 0.5, strength: 0, gesture_type: 'none' };
        let wasmInitialized = false;

        // Initialize WASM module
        async function initWasm() {
            try {
                await init();
                wasmInitialized = true;
                console.log('WASM module loaded successfully');
            } catch (error) {
                console.error('Failed to load WASM:', error);
            }
        }

        // Initialize canvas and particle system
        function initCanvas() {
            canvas = document.getElementById('particleCanvas');
            canvas.width = 800;
            canvas.height = 600;
            ctx = canvas.getContext('2d');

            if (wasmInitialized) {
                const count = parseInt(document.getElementById('particleCount').value);
                particleSystem = new ParticleSystem(canvas.width, canvas.height, count);
                updateParticleStatus();
            }
        }

        // Animation loop
        function animate() {
            if (!particleSystem || !ctx) return;

            // Convert gesture coordinates to canvas coordinates
            const gestureX = gestureData.x * canvas.width;
            const gestureY = gestureData.y * canvas.height;
            let strength = gestureData.strength;

            // Apply negative strength for repel gesture
            if (gestureData.gesture_type === 'repel') {
                strength = -strength;
            }

            particleSystem.update(gestureX, gestureY, strength);
            particleSystem.render(ctx);

            updateParticleStatus();
            animationId = requestAnimationFrame(animate);
        }

        // Update particle status display
        function updateParticleStatus() {
            if (particleSystem) {
                document.getElementById('particleStatus').textContent = particleSystem.get_particle_count();
            }
        }

        // Add particles on canvas click
        canvas.addEventListener('click', (e) => {
            if (!particleSystem) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            for (let i = 0; i < 10; i++) {
                particleSystem.add_particle(x, y);
            }
            updateParticleStatus();
        });

        // Fetch gesture data from Python server
        async function fetchGesture() {
            try {
                const response = await fetch('http://localhost:5000/api/gesture');
                if (response.ok) {
                    const data = await response.json();
                    gestureData = {
                        x: data.x || 0.5,
                        y: data.y || 0.5,
                        strength: data.strength || 0,
                        gesture_type: data.gesture_type || 'none'
                    };
                    
                    // Update UI
                    document.getElementById('gestureType').textContent = 
                        gestureData.gesture_type.charAt(0).toUpperCase() + gestureData.gesture_type.slice(1);
                    
                    const indicator = document.getElementById('gestureIndicator');
                    indicator.textContent = getGestureText(gestureData.gesture_type);
                    indicator.style.background = getGestureColor(gestureData.gesture_type);
                }
            } catch (error) {
                // Silently fail - server might not be running
            }
        }

        function getGestureText(type) {
            switch(type) {
                case 'attract': return '🧲 Atrayendo partículas';
                case 'repel': return '💨 Repeliendo partículas';
                case 'move': return '✋ Moviendo partículas';
                default: return 'Sin gestos detectados';
            }
        }

        function getGestureColor(type) {
            switch(type) {
                case 'attract': return 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                case 'repel': return 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
                case 'move': return 'linear-gradient(135deg, #5ee7df 0%, #b490ca 100%)';
                default: return '#e0e0e0';
            }
        }

        // Global functions for buttons
        window.startCamera = async function() {
            try {
                const response = await fetch('http://localhost:5000/api/start_camera', {
                    method: 'POST'
                });
                if (response.ok) {
                    document.getElementById('cameraStatus').textContent = 'En ejecución';
                    document.getElementById('cameraStatus').style.color = '#28a745';
                }
            } catch (error) {
                alert('Error: Asegúrate de que el servidor Python esté ejecutándose. Ejecuta: python gesture_server.py');
            }
        };

        window.stopCamera = async function() {
            try {
                const response = await fetch('http://localhost:5000/api/stop_camera', {
                    method: 'POST'
                });
                if (response.ok) {
                    document.getElementById('cameraStatus').textContent = 'Detenido';
                    document.getElementById('cameraStatus').style.color = '#dc3545';
                    gestureData = { x: 0.5, y: 0.5, strength: 0, gesture_type: 'none' };
                }
            } catch (error) {
                console.error('Error stopping camera:', error);
            }
        };

        window.addParticles = function() {
            if (!particleSystem) return;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            for (let i = 0; i < 20; i++) {
                particleSystem.add_particle(centerX, centerY);
            }
            updateParticleStatus();
        };

        window.updateParticleCount = function() {
            const count = parseInt(document.getElementById('particleCount').value);
            document.getElementById('particleCountValue').textContent = count;

            // Send to Python server
            fetch('http://localhost:5000/api/set_particles', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ count: count })
            }).catch(() => {});
        };

        // Initialize everything
        async function main() {
            await initWasm();
            initCanvas();
            animate();

            // Fetch gesture data periodically
            setInterval(fetchGesture, 100);
        }

        main();
    </script>
</body>
</html>
